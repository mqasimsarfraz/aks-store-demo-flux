apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-front
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store-front
  template:
    metadata:
      labels:
        app: store-front
    spec:
      nodeSelector:
        "kubernetes.io/os": linux
      volumes:
        - name: nginx-conf
          configMap:
            name: store-front-nginx-conf
      containers:
        - name: store-front
          image: ghcr.io/azure-samples/aks-store-demo/store-front:2.1.0
          ports:
            - containerPort: 8080
              name: store-front
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
          resources:
            requests:
              cpu: 1m
              memory: 200Mi
            limits:
              cpu: 1000m
              memory: 512Mi
        - name: virtual-customer
          image: ghcr.io/azure-samples/aks-store-demo/virtual-customer:2.1.0
          env:
            - name: ORDER_SERVICE_URL
              value: http://localhost:8080/api/orders
            - name: ORDERS_PER_HOUR
              value: "1200"
